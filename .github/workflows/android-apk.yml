name: Build Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Optional release tag to create or update, for example v1.0.0"
        required: false
        type: string

permissions:
  contents: write

jobs:
  apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-36.1" "build-tools;36.1.0"

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleDebug

      - name: Prepare APK asset
        run: |
          mkdir -p release-assets
          cp build/outputs/apk/debug/*.apk release-assets/CaptureBridge-Android-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CaptureBridge-Android-debug-apk
          path: release-assets/CaptureBridge-Android-debug.apk

      - name: Set release tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.tag_name }}" ]]; then
            echo "RELEASE_TAG=${{ inputs.tag_name }}" >> "$GITHUB_ENV"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
          fi

      - name: Publish GitHub Release
        if: env.RELEASE_TAG != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes "CaptureBridge Android debug APK."
          gh release upload "$RELEASE_TAG" release-assets/CaptureBridge-Android-debug.apk --clobber
