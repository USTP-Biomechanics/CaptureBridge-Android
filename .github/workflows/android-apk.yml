name: Build Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Optional release tag to create or update, for example v1.0.0"
        required: false
        type: string

permissions:
  contents: write

jobs:
  apk:
    name: Build release APK
    runs-on: ubuntu-latest
    env:
      HAS_RELEASE_SIGNING: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-36.1" "build-tools;36.1.0"

      - name: Verify release signing secrets
        run: |
          if [[ "$HAS_RELEASE_SIGNING" != "true" ]]; then
            echo "::error::Release signing secrets are required to build the published APK."
            exit 1
          fi

      - name: Prepare release signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/capturebridge-release.jks"

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/capturebridge-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleRelease

      - name: Prepare APK asset
        run: |
          mkdir -p release-assets
          cp build/outputs/apk/release/*.apk release-assets/CaptureBridge-Android.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CaptureBridge-Android-apk
          path: release-assets/CaptureBridge-Android.apk

      - name: Set release tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.tag_name }}" ]]; then
            echo "RELEASE_TAG=${{ inputs.tag_name }}" >> "$GITHUB_ENV"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
          fi

      - name: Publish GitHub Release
        if: env.RELEASE_TAG != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes "CaptureBridge Android APK."
          gh release upload "$RELEASE_TAG" release-assets/CaptureBridge-Android.apk --clobber
